<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ClawdClock</title>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@700;900&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; background: #000; overflow: hidden; }
    #root { width: 100%; height: 100%; }

    @keyframes flipUpperOut {
      from { transform: perspective(800px) rotateX(0deg); }
      to   { transform: perspective(800px) rotateX(-90deg); }
    }
    @keyframes flipLowerIn {
      from { transform: perspective(800px) rotateX(90deg); }
      to   { transform: perspective(800px) rotateX(0deg); }
    }
    @keyframes shadowFade {
      from { opacity: 1; }
      to   { opacity: 0; }
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
  const { useState, useEffect, useRef } = React;

  /* ─────────────────────────────────────────────────
     Constants
  ───────────────────────────────────────────────── */
  const FF   = "'Barlow','Helvetica Neue',Helvetica,sans-serif";
  const CW   = 310;     // card width  px
  const CH   = 388;     // card height px
  const HH   = CH / 2;  // half height
  const FS   = 350;     // digit font-size

  const C_CARD_TOP = '#121212';
  const C_CARD_BOT = '#0b0b0b';
  const C_FOLD     = '#000000';
  const C_ORANGE   = '#FF6B3D';
  const C_GREEN    = '#66CC44';
  const C_BLUE     = '#2D7DFF';

  /* shared digit text styles */
  const topNumStyle = {
    position: 'absolute', top: 0, left: 0,
    width: CW, height: CH,
    fontSize: FS, lineHeight: `${CH}px`,
    fontFamily: FF, fontWeight: 900,
    color: '#ffffff', textAlign: 'center',
    userSelect: 'none', letterSpacing: '-0.015em',
  };
  const botNumStyle = {
    ...topNumStyle,
    top: -HH,
    color: '#c0c0c0',
  };

  /* ─────────────────────────────────────────────────
     Bouncing Mascot (DVD-style, full screen)
  ───────────────────────────────────────────────── */
  const MASCOT_SIZE = 160;
  const SPEED       = 1.8; // px per frame
  const TOP_Y       = 20;  // fixed Y position at top

  function BouncingMascot() {
    const ref  = useRef(null);
    const pos  = useRef({ x: 80 });
    const vel  = useRef({ x: SPEED });
    const raf  = useRef(null);

    useEffect(() => {
      const tick = () => {
        const el = ref.current;
        if (!el) return;
        const W = window.innerWidth;
        const p = pos.current;
        const v = vel.current;

        p.x += v.x;

        if (p.x <= 0)               { p.x = 0;                  v.x =  Math.abs(v.x); }
        if (p.x >= W - MASCOT_SIZE) { p.x = W - MASCOT_SIZE;   v.x = -Math.abs(v.x); }

        el.style.transform = `translate(${p.x}px, ${TOP_Y}px)`;
        raf.current = requestAnimationFrame(tick);
      };
      raf.current = requestAnimationFrame(tick);
      return () => cancelAnimationFrame(raf.current);
    }, []);

    return (
      <div ref={ref} style={{
        position: 'fixed',
        top: 0, left: 0,
        width: MASCOT_SIZE, height: MASCOT_SIZE,
        zIndex: 999,
        pointerEvents: 'none',
        willChange: 'transform',
      }}>
        <img
          src="mascot.gif"
          width={MASCOT_SIZE}
          height={MASCOT_SIZE}
          style={{ display: 'block', imageRendering: 'pixelated' }}
          alt="mascot"
        />
      </div>
    );
  }

  /* ─────────────────────────────────────────────────
     Flip Digit
  ───────────────────────────────────────────────── */
  function FlipDigit({ value }) {
    const prevRef  = useRef(value);
    const timerRef = useRef(null);
    const [st, setSt] = useState({ curr: value, prev: value, flip: false });

    useEffect(() => {
      if (value !== prevRef.current) {
        clearTimeout(timerRef.current);
        const old = prevRef.current;
        prevRef.current = value;
        setSt({ curr: value, prev: old, flip: true });
        timerRef.current = setTimeout(
          () => setSt(s => ({ ...s, flip: false })),
          740
        );
      }
    }, [value]);

    const { curr, prev, flip } = st;

    return (
      <div style={{ position: 'relative', width: CW, height: CH, flexShrink: 0 }}>

        {/* ── static top half: always shows curr ── */}
        <div style={{
          position: 'absolute', top: 0, left: 0,
          width: CW, height: HH,
          overflow: 'hidden',
          background: C_CARD_TOP,
          borderRadius: '10px 10px 0 0',
        }}>
          <div style={topNumStyle}>{curr}</div>
        </div>

        {/* ── static bottom half: shows prev while flipping, then curr ── */}
        <div style={{
          position: 'absolute', bottom: 0, left: 0,
          width: CW, height: HH,
          overflow: 'hidden',
          background: C_CARD_BOT,
          borderRadius: '0 0 10px 10px',
        }}>
          <div style={botNumStyle}>{flip ? prev : curr}</div>
        </div>

        {/* ── fold line ── */}
        <div style={{
          position: 'absolute', top: HH - 1, left: 0,
          width: '100%', height: 3,
          background: C_FOLD, zIndex: 30,
          pointerEvents: 'none',
        }} />

        {/* ── notches ── */}
        {[[-6, HH - 8], [CW - 4, HH - 8]].map(([left, top], i) => (
          <div key={i} style={{
            position: 'absolute', top, left,
            width: 10, height: 16, borderRadius: 3,
            background: C_FOLD, zIndex: 31,
            pointerEvents: 'none',
          }} />
        ))}

        {/* ── animated flaps (only while flipping) ── */}
        {flip && (
          <>
            {/* upper flap: prev digit's top — folds forward and away */}
            <div style={{
              position: 'absolute', top: 0, left: 0,
              width: CW, height: HH,
              overflow: 'hidden',
              background: C_CARD_TOP,
              borderRadius: '10px 10px 0 0',
              transformOrigin: 'center bottom',
              animation: 'flipUpperOut 0.31s cubic-bezier(0.55,0,1,0.45) forwards',
              zIndex: 24,
              willChange: 'transform',
            }}>
              <div style={topNumStyle}>{prev}</div>
              {/* subtle shade at fold edge */}
              <div style={{
                position: 'absolute', bottom: 0, left: 0,
                width: '100%', height: 40,
                background: 'linear-gradient(to bottom, transparent, rgba(0,0,0,0.35))',
                pointerEvents: 'none',
              }} />
            </div>

            {/* lower flap: curr digit's bottom — unfolds from above */}
            <div style={{
              position: 'absolute', bottom: 0, left: 0,
              width: CW, height: HH,
              overflow: 'hidden',
              background: C_CARD_BOT,
              borderRadius: '0 0 10px 10px',
              transformOrigin: 'center top',
              animation: 'flipLowerIn 0.31s cubic-bezier(0,0.55,0.45,1) 0.31s both',
              transform: 'perspective(800px) rotateX(90deg)',
              zIndex: 24,
              willChange: 'transform',
            }}>
              <div style={botNumStyle}>{curr}</div>
              {/* subtle shade at fold edge */}
              <div style={{
                position: 'absolute', top: 0, left: 0,
                width: '100%', height: 40,
                background: 'linear-gradient(to top, transparent, rgba(0,0,0,0.28))',
                pointerEvents: 'none',
              }} />
            </div>

            {/* shadow cast on lower-static from upper flap */}
            <div style={{
              position: 'absolute', bottom: 0, left: 0,
              width: CW, height: HH,
              background: 'rgba(0,0,0,0.5)',
              borderRadius: '0 0 10px 10px',
              animation: 'shadowFade 0.31s ease-out forwards',
              zIndex: 23,
              pointerEvents: 'none',
            }} />
          </>
        )}
      </div>
    );
  }

  /* ─────────────────────────────────────────────────
     Flip Clock
  ───────────────────────────────────────────────── */
  function FlipClock({ hours, minutes }) {
    const h = String(hours).padStart(2, '0');
    const m = String(minutes).padStart(2, '0');
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 16, alignItems: 'center' }}>
        <div style={{ display: 'flex', gap: 12 }}>
          <FlipDigit value={h[0]} />
          <FlipDigit value={h[1]} />
        </div>
        <div style={{ display: 'flex', gap: 12 }}>
          <FlipDigit value={m[0]} />
          <FlipDigit value={m[1]} />
        </div>
      </div>
    );
  }

  /* ─────────────────────────────────────────────────
     Progress Bar
  ───────────────────────────────────────────────── */
  function ProgressBar({ pct, color }) {
    return (
      <div style={{
        width: '100%', height: 7,
        background: '#1d1d1d',
        borderRadius: 4, overflow: 'hidden',
      }}>
        <div style={{
          width: `${pct}%`, height: '100%',
          background: color, borderRadius: 4,
        }} />
      </div>
    );
  }

  /* ─────────────────────────────────────────────────
     Usage Section
  ───────────────────────────────────────────────── */
  function UsageSection({ label, pct, color, resetIn }) {
    return (
      <div style={{ display: 'flex', flexDirection: 'column', gap: 20 }}>
        <div style={{
          fontSize: 14, fontWeight: 700,
          letterSpacing: '0.18em',
          color: '#4e4e4e',
          fontFamily: FF,
        }}>
          {label}
        </div>

        <div style={{ display: 'flex', alignItems: 'baseline', gap: 3, lineHeight: 1 }}>
          <span style={{
            fontSize: 114, fontWeight: 900,
            color, fontFamily: FF,
            letterSpacing: '-0.04em', lineHeight: 1,
          }}>
            {pct}
          </span>
          <span style={{
            fontSize: 52, fontWeight: 700,
            color, fontFamily: FF,
            opacity: 0.6, letterSpacing: '-0.02em',
          }}>
            %
          </span>
        </div>

        <ProgressBar pct={pct} color={color} />

        <div style={{
          fontSize: 13, fontWeight: 600,
          letterSpacing: '0.15em',
          color: '#383838',
          fontFamily: FF,
        }}>
          RESETS IN {resetIn}
        </div>
      </div>
    );
  }

  /* ─────────────────────────────────────────────────
     App
  ───────────────────────────────────────────────── */
  function App() {
    const [now,   setNow]   = useState(() => new Date());
    const [scale, setScale] = useState(() =>
      Math.min(window.innerWidth / 1920, window.innerHeight / 1080)
    );

    useEffect(() => {
      const id = setInterval(() => setNow(new Date()), 1000);
      return () => clearInterval(id);
    }, []);

    useEffect(() => {
      const fn = () =>
        setScale(Math.min(window.innerWidth / 1920, window.innerHeight / 1080));
      window.addEventListener('resize', fn);
      return () => window.removeEventListener('resize', fn);
    }, []);

    return (
      <div style={{
        position: 'fixed', inset: 0,
        background: '#000',
        display: 'flex', alignItems: 'center', justifyContent: 'center',
      }}>
        <BouncingMascot />
        {/* fixed 1920×1080 canvas, scales to viewport */}
        <div style={{
          width: 1920, height: 1080,
          transform: `scale(${scale})`,
          transformOrigin: 'center center',
          background: '#000000',
          display: 'flex',
          flexShrink: 0,
        }}>

          {/* ══════════════════════════════════════
              LEFT SECTION  (40%) — Flip Clock
          ══════════════════════════════════════ */}
          <div style={{
            width: '40%', height: '100%',
            display: 'flex',
            alignItems: 'center',
            justifyContent: 'center',
          }}>
            <FlipClock hours={now.getHours()} minutes={now.getMinutes()} />
          </div>

          {/* ══════════════════════════════════════
              RIGHT SECTION (60%) — Dashboard
          ══════════════════════════════════════ */}
          <div style={{
            flex: 1, height: '100%',
            display: 'flex',
            flexDirection: 'column',
            justifyContent: 'center',
            paddingLeft: 112,
            paddingRight: 140,
            paddingTop: 80,
            paddingBottom: 80,
          }}>

            {/* Header: title + mascot */}
            <div style={{
              display: 'flex',
              alignItems: 'flex-start',
              justifyContent: 'space-between',
              marginBottom: 92,
            }}>
              <div style={{
                fontSize: 62, fontWeight: 900, lineHeight: 1,
                color: C_ORANGE,
                fontFamily: FF,
                letterSpacing: '0.055em',
                whiteSpace: 'nowrap',
              }}>
                CLAUDE CODE
              </div>

            </div>

            {/* Session metric */}
            <UsageSection
              label="SESSION (5H)"
              pct={37}
              color={C_GREEN}
              resetIn="2h 14m"
            />

            {/* Divider */}
            <div style={{
              height: 1,
              background: '#1c1c1c',
              margin: '70px 0',
            }} />

            {/* Weekly metric */}
            <UsageSection
              label="WEEKLY (7D)"
              pct={12}
              color={C_BLUE}
              resetIn="5d 14h"
            />

          </div>
        </div>
      </div>
    );
  }

  ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
