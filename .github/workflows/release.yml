name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend deps
        run: npm ci

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'ClawdClock ${{ github.ref_name }}'
          releaseBody: |
            See [ROADMAP.md](https://github.com/${{ github.repository }}/blob/main/ROADMAP.md) for what changed.
          releaseDraft: true
          prerelease: false
          includeUpdaterJson: true

      - name: Package screensaver (.scr)
        shell: pwsh
        run: |
          $version = "${{ github.ref_name }}".TrimStart('v')
          ./build-scr.ps1 -Version $version

      - name: Upload .scr to release
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/target/release/bundle/ClawdClock_*_x64.scr
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
